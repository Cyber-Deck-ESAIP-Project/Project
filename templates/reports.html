<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberDeck OS // Reports Viewer</title>
    <style>
        :root {
            --bg-main: #0D1117;
            --bg-panel: #010409;
            --border: #30363D;
            --text-main: #C9D1D9;
            --accent-cyan: #00FFFF;
            --accent-green: #4ADE80;
            --accent-orange: #F59E0B;
            --accent-red: #FF4444;
            --font-mono: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: var(--font-mono);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        .header {
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--accent-orange);
            margin: 0;
            font-size: 1.5rem;
            text-shadow: 0 0 5px rgba(245, 158, 11, 0.3);
        }

        .btn {
            background: var(--bg-panel);
            color: var(--accent-cyan);
            border: 1px solid var(--border);
            padding: 10px 15px;
            font-family: var(--font-mono);
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: var(--accent-cyan);
        }

        .workspace {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .sidebar {
            width: 300px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .sidebar h2 {
            color: var(--accent-cyan);
            font-size: 1.1rem;
            margin-top: 0;
            text-align: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .file-item {
            padding: 10px;
            border: 1px solid var(--border);
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.2s;
            word-break: break-all;
            font-size: 0.9rem;
        }

        .file-item:hover,
        .file-item.active {
            background: rgba(0, 255, 255, 0.1);
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
        }

        .report-container {
            flex: 1;
            background: var(--bg-main);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        .loader {
            display: none;
            padding: 20px;
            color: var(--accent-cyan);
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>EXECUTIVE REPORT SUMMARY</h1>
        <div>
            <a href="/reports" class="btn">[ GLOBAL DASHBOARD REPORT ]</a>
            <a href="/" class="btn" style="margin-left: 10px;">[ REturn to TERMINAL ]</a>
        </div>
    </div>

    <div class="workspace">
        <div class="sidebar">
            <h2>RESULT FILES</h2>
            <ul class="file-list" id="fileList">
                <li>Loading files...</li>
            </ul>
        </div>

        <div class="report-container">
            <div id="loader" class="loader">Generating Report... Please Wait.</div>
            <iframe id="reportFrame" src=""></iframe>
        </div>
    </div>

    <script>
        async function fetchFiles() {
            try {
                const response = await fetch('/api/results/list');
                const files = await response.json();

                const listEl = document.getElementById('fileList');
                listEl.innerHTML = '';

                if (files.length === 0) {
                    listEl.innerHTML = '<li>No result files found.</li>';
                    return;
                }

                files.forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.textContent = file;
                    li.onclick = () => loadReport(file, li);
                    listEl.appendChild(li);
                });
            } catch (e) {
                console.error("Failed to fetch files", e);
            }
        }

        function loadReport(filename, listItem) {
            // Update active state in sidebar
            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
            if (listItem) listItem.classList.add('active');

            const frame = document.getElementById('reportFrame');
            const loader = document.getElementById('loader');

            frame.style.display = 'none';
            loader.style.display = 'block';

            frame.onload = function () {
                loader.style.display = 'none';
                frame.style.display = 'block';
            };

            frame.src = `/report/${encodeURIComponent(filename)}`;
        }

        function loadGlobalReport() {
            // Hard reset the reports view and clear selected report state.
            window.location.href = '/reports';
        }

        // Init
        fetchFiles();
        (function initGlobalDashboard() {
            const frame = document.getElementById('reportFrame');
            const loader = document.getElementById('loader');

            frame.style.display = 'none';
            loader.style.display = 'block';

            frame.onload = function () {
                loader.style.display = 'none';
                frame.style.display = 'block';
            };

            frame.src = '{{ global_report_url }}?t=' + Date.now();
        })();
    </script>
</body>

</html>
